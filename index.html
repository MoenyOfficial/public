<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace | Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <aside class="sidebar">
    <div style="margin-bottom: 3rem;">
      <h1 style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; margin: 0;">vV canceld</h1>
      <p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem;">Official Project Tracking</p>
    </div>

    <nav>
      <a href="index.html" class="nav-link active">Overview</a>
      <a href="projects.html" class="nav-link">Projects</a>
    </nav>
  </aside>

  <main class="main-content">
    <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem;">
      <div>
        <h2 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.025em; margin: 0 0 0.5rem 0;">Dashboard</h2>
        <p style="color: var(--text-secondary); max-w: 600px; line-height: 1.5;">
          A high-level overview of all active internal projects and their current completion status.
        </p>
      </div>
    </header>

    <div class="stats-grid">
      <div class="card">
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0 0 0.5rem 0;">Total Projects</p>
        <h3 id="totalTasks" style="font-size: 2rem; font-weight: 700; margin: 0;">0</h3>
      </div>
      <div class="card">
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0 0 0.5rem 0;">Completed</p>
        <h3 id="completedTasks" style="font-size: 2rem; font-weight: 700; margin: 0;">0</h3>
      </div>
      <div class="card">
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0 0 0.5rem 0;">Avg. Progress</p>
        <h3 id="avgProgress" style="font-size: 2rem; font-weight: 700; margin: 0;">0%</h3>
      </div>
    </div>

    <section class="table-container">
      <div class="table-header">
        <div style="grid-column: span 5;">Project Name</div>
        <div style="grid-column: span 2;">Category</div>
        <div style="grid-column: span 2;">Status</div>
        <div style="grid-column: span 3; text-align: right;">Progress</div>
      </div>
      <div id="taskTable"></div>
    </section>
  </main>

  <script>
    async function loadTodos() {
      try {
        const response = await fetch('todos.json');
        const data = await response.json();

        document.getElementById('totalTasks').textContent = data.items.length;
        document.getElementById('completedTasks').textContent = data.items.filter(i => i.done === true).length;
        
        const avg = Math.round(data.items.reduce((s, i) => s + i.progress, 0) / data.items.length);
        document.getElementById('avgProgress').textContent = `${avg}%`;

        const container = document.getElementById('taskTable');
        data.items.forEach(item => {
          let badgeClass = 'badge-progress';
          let statusText = 'Working';
          
          if (item.done === true) {
            badgeClass = 'badge-completed';
            statusText = 'Finished';
          } else if (item.done === 'canceled') {
            badgeClass = 'badge-canceled';
            statusText = 'Canceled';
          }

          const row = document.createElement('div');
          row.className = 'table-row';
          row.innerHTML = `
            <div style="grid-column: span 5;">
              <p style="font-weight: 600; margin: 0;">${item.title}</p>
              <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 4px 0 0 0;">${item.note}</p>
            </div>
            <div style="grid-column: span 2;">
              <span class="badge">${item.tags[0]}</span>
            </div>
            <div style="grid-column: span 2;">
              <span class="badge ${badgeClass}">
                ${statusText}
              </span>
            </div>
            <div style="grid-column: span 3;">
              <div style="display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 0.5rem;">
                <span>Completion</span>
                <span style="font-weight: 600;">${item.progress}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${item.progress}%"></div>
              </div>
            </div>
          `;
          container.appendChild(row);
        });
      } catch (e) {
        console.error("Failed to load todos:", e);
      }
    }
    loadTodos();
  </script>
</body>
</html>
