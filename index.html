<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-4 sm:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-10 border-b border-slate-200 pb-4">
            <h1 class="text-2xl sm:text-3xl font-semibold mb-2">Project Overview</h1>
            <div class="text-sm text-slate-500" id="updated-date">Loading data...</div>
        </header>

        <main class="grid gap-6" id="todo-container"></main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchData();
        });

        async function fetchData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error('Network response failed');
                }
                const data = await response.json();
                renderUI(data);
            } catch (error) {
                document.getElementById('updated-date').textContent = "Error loading data.";
                console.error(error);
            }
        }

        function renderUI(data) {
            document.getElementById('updated-date').textContent = "Last updated: " + data.updated;
            
            const container = document.getElementById('todo-container');
            container.innerHTML = '';

            data.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 rounded-lg p-6 shadow-sm';

                const statusClass = item.done ? 'bg-green-100 text-green-800' : 'bg-slate-100 text-slate-600';
                const statusText = item.done ? 'Completed' : 'In Progress';
                const fillClass = item.done ? 'bg-green-600' : 'bg-blue-600';

                let tagsHTML = '';
                item.tags.forEach(tag => {
                    tagsHTML += `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">${tag}</span>`;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h2 class="text-lg font-semibold m-0">${item.title}</h2>
                        <span class="text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider ${statusClass}">
                            ${statusText}
                        </span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">
                        ${tagsHTML}
                    </div>
                    <div class="text-sm text-slate-500 mb-6">
                        ${item.note}
                    </div>
                    <div class="mt-auto">
                        <div class="flex justify-between text-xs text-slate-500 mb-2">
                            <span>Completion</span>
                            <span>${item.progress}%</span>
                        </div>
                        <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-500 ease-out ${fillClass}" style="width: ${item.progress}%"></div>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
