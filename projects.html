<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace | Finished Projects</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <aside class="sidebar">
    <div style="margin-bottom: 3rem;">
      <h1 style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; margin: 0;">vV canceld</h1>
      <p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem;">Official Project Tracking</p>
    </div>

    <nav>
      <a href="index.html" class="nav-link">Overview</a>
      <a href="projects.html" class="nav-link active">Projects</a>
    </nav>
  </aside>

  <main class="main-content">
    <header style="margin-bottom: 3rem;">
      <h2 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.025em; margin: 0 0 0.5rem 0;">Finished Projects</h2>
      <p style="color: var(--text-secondary); max-w: 600px; line-height: 1.5;">
        A showcase of completed works and achieved milestones archived from the active workspace.
      </p>
    </header>

    <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
      <input type="text" placeholder="Search archive..." style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 0.375rem; flex-grow: 1; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--text-primary)'" onblur="this.style.borderColor='var(--border-color)'">
    </div>

    <div id="projectGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
      <!-- Projects will be loaded from projects.json -->
    </div>
  </main>

  <script>
    async function loadProjects() {
      try {
        const response = await fetch('projects.json');
        const data = await response.json();
        const container = document.getElementById('projectGrid');
        
        data.items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.display = 'flex';
          card.style.flexDirection = 'column';
          card.style.justifyContent = 'space-between';
          card.style.minHeight = '180px';

          card.innerHTML = `
            <div>
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                <h4 style="font-size: 1.25rem; font-weight: 700; margin: 0;">${item.title}</h4>
                <span class="badge badge-completed">DONE</span>
              </div>
              <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 1rem;">
                ${item.note}
              </p>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1rem;">
              <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600;">COMPLETED: ${item.completed_date}</span>
              <a href="${item.link}" style="font-size: 0.75rem; font-weight: 700; color: var(--text-primary); text-decoration: none;">VIEW CASE →</a>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        console.error("Failed to load projects:", e);
      }
    }
    loadProjects();
  </script>
</body>
</html>
